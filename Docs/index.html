<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux CTF Academy</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>CTF Academy</h2>
            <div id="user-info">
                <p>User: <span id="username-display">student</span></p>
                <p>XP: <span id="xp-display">0</span></p>
            </div>
            <div id="level-info">
                <h3 id="level-title">Cargando...</h3>
                <p id="level-objective"></p>
                <div class="hints">
                    <button onclick="showHint()">Pista</button>
                    <p id="hint-text" class="hidden"></p>
                </div>
            </div>
        </aside>
        
        <main class="terminal-container">
            <div id="terminal-output"></div>
            <div class="input-line">
                <span class="prompt" id="prompt-text">student@ctf:~$</span>
                <input type="text" id="terminal-input" autocomplete="off" autofocus>
            </div>
        </main>
    </div>

    <script src="./filesystem.js"></script>
    <script src="./commands.js"></script>
    <script src="./terminal.js"></script>
    <script src="./app.js"></script>
</body>
</html>
